# ============================================================
# DevMentor — LoRA Fine-Tuning Configuration
# ============================================================
# All hyperparameters for the Qwen2.5-Coder-7B LoRA training run.
# Change values here instead of editing train_lora.py.

# --- Base model & tokenizer ---
model:
  name: "Qwen/Qwen2.5-Coder-7B-Instruct"
  max_seq_length: 1024          # Max tokens per example (prompt + completion)

# --- Dataset paths (generated by prepare_dataset.py) ---
dataset:
  train_file: "data/bugfix/processed/train.jsonl"
  val_file: "data/bugfix/processed/val.jsonl"

# --- QLoRA quantization (matches proposal: "4-bit quantization") ---
quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: "bfloat16"

# --- LoRA adapter settings (matches proposal: "rank 8-16, attention layers only") ---
lora:
  rank: 16                      # Adapter capacity (proposal range: 8-16)
  alpha: 32                     # Scaling factor, typically 2 * rank
  dropout: 0.05                 # Regularization
  target_modules:               # Attention layers only, per proposal
    - q_proj
    - k_proj
    - v_proj
    - o_proj
  bias: "none"
  task_type: "CAUSAL_LM"

# --- Training hyperparameters ---
training:
  output_dir: "/content/drive/MyDrive/DevMentor_LoRA/adapter"
  num_train_epochs: 2           # Full passes over 1000 examples
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 4  # Effective batch = 2 * 4 = 8
  learning_rate: 2.0e-4         # Standard for LoRA
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.01
  max_grad_norm: 0.3
  optim: "paged_adamw_8bit"     # Memory-efficient optimizer
  logging_steps: 10             # Print loss every 10 steps
  eval_strategy: "steps"
  eval_steps: 50                # Evaluate on val.jsonl every 50 steps
  save_strategy: "steps"
  save_steps: 100               # Save checkpoint every 100 steps
  save_total_limit: 2           # Keep only 2 most recent checkpoints
  bf16: true                    # Use bfloat16 mixed precision (fast on L4)
  seed: 42                      # Reproducibility

# --- Experiment tracking ---
experiment:
  name: "qwen25-coder-7b-lora-bugfix-v1"
  description: "LoRA r=16 alpha=32 on code_x_glue_cc_code_refinement medium subset, 1000 examples, 2 epochs"